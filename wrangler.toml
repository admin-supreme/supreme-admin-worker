name = "anilist-sync"
main = "worker-prime-fetcher.js"
compatibility_date = "2024-12-01"
workers_dev = true
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = [
  "0 */6 * * *",
  "* * * * *"
]
[[kv_namespaces]]
binding = "STATE"
id = "a27b4f2d29124505a560ef727a1f4d36"

[vars]
START_PAGE = "1"
TURSO_DATABASE_URL="URL"
TURSO_AUTH_TOKEN="Token"
TMDB_API_KEY="TmdbApiKey"
